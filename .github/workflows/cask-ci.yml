name: Cask CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tap local checkout
        run: brew tap Ando-Corporation/tap "$GITHUB_WORKSPACE"

      - name: Check style
        run: brew style Ando-Corporation/tap/ando

      - name: Audit cask
        run: brew audit --cask --new Ando-Corporation/tap/ando

      - name: Check live version
        run: brew livecheck --cask Ando-Corporation/tap/ando
